<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Initiative Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=MedievalSharp&display=swap" rel="stylesheet">
<style>
body{font-family:'Cinzel',serif;background:radial-gradient(circle at top,#1b1b1b,#0a0a0a);color:#f5e6c8;display:flex;justify-content:center;padding:20px}
.container{width:500px;background:#14110f;border:2px solid #8b6f3d;padding:20px;border-radius:12px}
h1{text-align:center;font-family:'MedievalSharp';color:#d4af37}
input,select{width:30%;margin:5px 1%;padding:6px;background:#1f1a16;color:#f5e6c8;border:1px solid #8b6f3d}
button{width:100%;margin-top:8px;padding:8px;background:#2a2115;color:#f5e6c8;border:1px solid #8b6f3d;cursor:pointer}
ul{list-style:none;padding:0}
li{margin:6px 0;padding:8px;border:1px solid #8b6f3d;border-radius:8px}
.player{background:#1e3a5f}.enemy{background:#5f1e1e}.boss{background:#5a3d00}
.active{background:#d4af37!important;color:black}
.bar{height:8px;background:#333;border-radius:4px;margin-top:4px;overflow:hidden}
.fill{height:100%;transition:0.3s}
.saves{font-size:12px;margin-top:4px}
</style>
</head>
<body>
<div class="container">
<h1>⚔ Initiative ⚔</h1>

<input id="name" placeholder="Name" />
<input id="initiative" type="number" placeholder="Init" />
<input id="hp" type="number" placeholder="HP" />
<input id="maxhp" type="number" placeholder="Max HP" />
<input id="ac" type="number" placeholder="AC" />
<select id="type">
<option value="player">🛡 Player</option>
<option value="enemy">💀 Baddie</option>
<option value="boss">👑 Boss</option>
</select>

<button onclick="addCharacter()">➕ Add</button>
<button onclick="startCombat()">🗡 Start</button>
<button onclick="nextTurn()">⏭ Next</button>
<button onclick="resetCombat()">🧹 Reset</button>

<div>Round: <span id="round">1</span></div>
<ul id="list"></ul>
</div>

<script>
let characters=[];
let currentIndex=0;
let round=1;

function addCharacter(){
const name=document.getElementById('name').value;
const initiative=parseInt(document.getElementById('initiative').value);
const hp=parseInt(document.getElementById('hp').value)||0;
const maxhp=parseInt(document.getElementById('maxhp').value)||hp;
const ac=parseInt(document.getElementById('ac').value)||0;
const type=document.getElementById('type').value;
if(!name||isNaN(initiative))return;
characters.push({name,initiative,hp,maxhp,ac,type,success:0,fail:0});
renderList();
}

function resetCombat(){characters=[];currentIndex=0;round=1;updateRound();renderList();}

function startCombat(){characters.sort((a,b)=>b.initiative-a.initiative);currentIndex=0;round=1;updateRound();renderList();}

function nextTurn(){if(characters.length===0)return;currentIndex++;if(currentIndex>=characters.length){currentIndex=0;round++;updateRound();}renderList();}

function updateRound(){document.getElementById('round').textContent=round;}

function changeHP(i, amt){
characters[i].hp += amt;
if(characters[i].hp < 0) characters[i].hp = 0;
if(characters[i].hp > characters[i].maxhp) characters[i].hp = characters[i].maxhp;
renderList();
}

function saveRoll(i, success){
if(success) characters[i].success++;
else characters[i].fail++;
renderList();
}

function getHealthColor(percent){
if(percent > 60) return '#4ade80'; // green
if(percent > 30) return '#facc15'; // yellow
return '#ef4444'; // red
}

function renderList(){
const list=document.getElementById('list');list.innerHTML='';
characters.forEach((c,i)=>{
const li=document.createElement('li');
li.classList.add(c.type);

const percent = c.maxhp ? (c.hp / c.maxhp) * 100 : 0;
const color = getHealthColor(percent);

let deathUI = '';
if(c.type==='player' && c.hp===0){
  deathUI = `
    <div class='saves'>
      Death Saves ✔ ${c.success} ❌ ${c.fail}<br>
      <button onclick='saveRoll(${i},true)'>✔ Success</button>
      <button onclick='saveRoll(${i},false)'>❌ Fail</button>
    </div>
  `;
}

li.innerHTML=`
  ${c.name} | ${c.hp}/${c.maxhp} HP | AC:${c.ac}<br>
  <div class='bar'><div class='fill' style='width:${percent}%; background:${color}'></div></div>
  <button onclick='changeHP(${i},-1)'>-1</button>
  <button onclick='changeHP(${i},-5)'>-5</button>
  <button onclick='changeHP(${i},+5)'>+5</button>
  ${deathUI}
`;

if(i===currentIndex)li.classList.add('active');
list.appendChild(li);
});
}
</script>
</body>
</html>
