<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Initiative Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=MedievalSharp&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Cinzel', serif;
      background: radial-gradient(circle at top, #1b1b1b, #0a0a0a);
      color: #f5e6c8;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 420px;
      background: #14110f;
      border: 2px solid #8b6f3d;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 25px rgba(0,0,0,0.8);
    }

    h1 {
      text-align: center;
      font-family: 'MedievalSharp', cursive;
      font-size: 28px;
      margin-bottom: 10px;
      color: #d4af37;
    }

    input {
      width: 48%;
      padding: 8px;
      margin: 5px 1%;
      border-radius: 6px;
      border: 1px solid #8b6f3d;
      background: #1f1a16;
      color: #f5e6c8;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: 1px solid #8b6f3d;
      border-radius: 8px;
      background: linear-gradient(#3b2f1c, #2a2115);
      color: #f5e6c8;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: linear-gradient(#5a472a, #3b2f1c);
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 15px;
    }

    li {
      padding: 10px;
      margin-bottom: 6px;
      background: #2a2115;
      border: 1px solid #8b6f3d;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 15px;
    }

    .active {
      background: linear-gradient(#d4af37, #b8962e) !important;
      color: #1a1205;
      font-weight: bold;
      box-shadow: 0 0 10px rgba(212,175,55,0.6);
    }

    .round {
      text-align: center;
      margin-top: 10px;
      font-weight: bold;
      font-size: 18px;
      color: #d4af37;
    }

    .tag {
      font-size: 12px;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚔ Initiative ⚔</h1>

    <input id="name" placeholder="Character / Creature" />
    <input id="initiative" type="number" placeholder="Initiative" />
    <button onclick="addCharacter()">➕ Add to Battle</button>

    <button onclick="startCombat()">🗡 Begin Combat</button>
    <button onclick="nextTurn()">⏭ Next Turn</button>

    <div class="round">Round: <span id="round">1</span></div>

    <ul id="list"></ul>
  </div>

  <script>
    let characters = [];
    let currentIndex = 0;
    let round = 1;

    function addCharacter() {
      const name = document.getElementById('name').value;
      const initiative = parseInt(document.getElementById('initiative').value);

      if (!name || isNaN(initiative)) return;

      characters.push({ name, initiative });
      renderList();

      document.getElementById('name').value = '';
      document.getElementById('initiative').value = '';
    }

    function startCombat() {
      characters.sort((a, b) => b.initiative - a.initiative);
      currentIndex = 0;
      round = 1;
      updateRound();
      renderList();
    }

    function nextTurn() {
      if (characters.length === 0) return;

      currentIndex++;
      if (currentIndex >= characters.length) {
        currentIndex = 0;
        round++;
        updateRound();
      }

      renderList();
    }

    function updateRound() {
      document.getElementById('round').textContent = round;
    }

    function renderList() {
      const list = document.getElementById('list');
      list.innerHTML = '';

      characters.forEach((char, index) => {
        const li = document.createElement('li');
        li.innerHTML = `<span>${char.name}</span><span class='tag'>Init: ${char.initiative}</span>`;

        if (index === currentIndex) {
          li.classList.add('active');
        }

        list.appendChild(li);
      });
    }
  </script>
</body>
</html>
